<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocabulary Trainer</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f7fb;
  margin: 0;
}

#testButtons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  background: #fff;
  padding: 10px;
  position: sticky;
  top: 0;
}

button {
  margin: 5px;
  padding: 10px 20px;
  font-size: 18px;
}

.box {
  width: 50px;
  height: 60px;
  font-size: 32px;
  text-align: center;
  margin: 5px;
}

.correct { border: 2px solid green; }
.wrong { border: 2px solid red; }
</style>
</head>

<body>

<h1>Vocabulary Trainer</h1>

<div id="testButtons"></div>

<div>
  <button onclick="prevWord()">⬅</button>
  <button onclick="nextWord()">➡</button>
  <button onclick="playSound()">🔊 Replay</button>

  <select id="voiceSelect">
    <option value="Daniel">Daniel (UK)</option>
    <option value="Samantha">Samantha (US)</option>
  </select>
</div>

<div id="inputs"></div>
<p id="result"></p>

<script>
let tests = [];
let currentTest = 0;
let currentIndex = 0;
let currentWord = "";
let attempts = 0;
let selectedVoiceName = "Daniel";

// 🔔 正確音（叮噹）
function playCorrectSound() {
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  let g = ctx.createGain();

  o.type = "sine";
  o.frequency.setValueAtTime(880, ctx.currentTime); // 高音

  // 音量包絡（叮一聲）
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime + 0.4);
}

// 🔻 錯誤音（dum）
function playWrongSound() {
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  let g = ctx.createGain();

  o.type = "sine";
  o.frequency.setValueAtTime(150, ctx.currentTime); // 低音

  // dum 效果（快起慢跌）
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime + 0.5);
}

// Load vocab
fetch('vocab.txt')
.then(r => r.text())
.then(text => {
  let temp = [];

  text.split("\n").forEach(line => {
    if (line.trim() === "===") {
      tests.push(temp);
      temp = [];
    } else {
      temp.push(line.trim());
    }
  });

  if (temp.length) tests.push(temp);

  createTestButtons();
  startTest(0);
});

function createTestButtons() {
  let c = document.getElementById("testButtons");

  tests.forEach((t,i) => {
    let b = document.createElement("button");
    b.textContent = "Test " + (i+1);
    b.onclick = () => startTest(i);
    c.appendChild(b);
  });
}

function startTest(i) {
  currentTest = i;
  currentIndex = 0;
  loadWord();
}

function loadWord() {
  attempts = 0;
  document.getElementById("result").textContent = "";
  currentWord = tests[currentTest][currentIndex];
  createInputs();
  playSound();
}

function createInputs() {
  let c = document.getElementById("inputs");
  c.innerHTML = "";

  for (let i=0;i<currentWord.length;i++) {
    let input = document.createElement("input");
    input.maxLength = 1;
    input.className = "box";

    input.onfocus = function() {
      setTimeout(() => this.select(), 0);
    };

    input.oninput = () => {
      input.value = input.value.slice(-1); // 覆蓋輸入
      handleInput(i);
    };

    input.onkeydown = (e) => {
      if (e.key === "Backspace" && !input.value && i > 0) {
        c.children[i-1].focus();
      }
    };

    c.appendChild(input);
  }

  c.children[0].focus();
}

function handleInput(index) {
  let inputs = document.querySelectorAll(".box");

  if (inputs[index].value && index < inputs.length - 1) {
    inputs[index+1].focus();
  }

  let word = "";
  let full = true;

  inputs.forEach(i => {
    if (!i.value) full = false;
    word += i.value;
  });

  if (full) checkAnswer(word);
}

function checkAnswer(word) {
  let inputs = document.querySelectorAll(".box");

  inputs.forEach(i => i.disabled = true);

  if (word.toLowerCase() === currentWord.toLowerCase()) {
    inputs.forEach(i => i.classList.add("correct"));
    document.getElementById("result").textContent = "✔ Correct";
    playCorrectSound(); // 🔔

  } else {
    attempts++;
    inputs.forEach(i => i.classList.add("wrong"));
    playWrongSound(); // 🔻

    if (attempts >= 3) {
      document.getElementById("result").textContent =
        "Answer: " + currentWord;
    } else {
      setTimeout(() => {
        inputs.forEach(i => {
          i.value = "";
          i.classList.remove("wrong");
          i.disabled = false;
        });
        inputs[0].focus();
      }, 800);
    }
  }
}

function nextWord() {
  if (currentIndex < tests[currentTest].length - 1) {
    currentIndex++;
    loadWord();
  } else {
    document.getElementById("result").textContent = "END";
  }
}

function prevWord() {
  if (currentIndex > 0) {
    currentIndex--;
    loadWord();
  }
}

function playSound() {
  let utter = new SpeechSynthesisUtterance(currentWord);
  let voices = speechSynthesis.getVoices();
  let v = voices.find(v => v.name.includes(selectedVoiceName));

  if (v) utter.voice = v;
  utter.lang = "en-GB";

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

document.getElementById("voiceSelect").onchange = function() {
  selectedVoiceName = this.value;
};
</script>

</body>
</html>
