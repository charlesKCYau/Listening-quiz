<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocabulary Trainer</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f7fb;
  margin: 0;
}

#testButtons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  background: #fff;
  padding: 10px;
  position: sticky;
  top: 0;
}

/* 普通 button */
#testButtons button {
  margin: 5px;
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #4CAF50;
  color: white;
  cursor: pointer;
  transition: all 0.2s;
}

/* ⭐ 當前 Test（凹效果） */
#testButtons button.active {
  background: #2e7d32;
  box-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
  transform: translateY(2px);
}

#answerList {
  color: blue;
}

button {
  margin: 5px;
  padding: 10px 20px;
  font-size: 18px;
}

.box {
  width: 50px;
  height: 60px;
  font-size: 32px;
  text-align: center;
  margin: 5px;
}

.correct { border: 2px solid green; }
.wrong { border: 2px solid red; }
</style>
</head>

<body>

<h1>Vocabulary Trainer</h1>

<div id="testButtons"></div>

<div>
  <button onclick="prevWord()">⬅</button>
  <button onclick="nextWord()">➡</button>
  <button onclick="playSound()">🔊 Replay</button>

  <select id="voiceSelect">
    <option value="Daniel">Daniel (UK)</option>
    <option value="Samantha">Samantha (US)</option>
  </select>
</div>

<h2 id="questionNumber"></h2>
<div id="inputs"></div>
<p id="result"></p>
<div id="answerList"></div>

<script>
let tests = [];
let currentTest = 0;
let currentIndex = 0;
let currentWord = "";
let attempts = 0;
let selectedVoiceName = "Daniel";

// 🔔 正確音
function playCorrectSound() {
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  let g = ctx.createGain();

  o.frequency.setValueAtTime(880, ctx.currentTime);
  g.gain.setValueAtTime(0.5, ctx.currentTime);

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime + 0.3);
}

// 🔻 錯誤音
function playWrongSound() {
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  let g = ctx.createGain();

  o.frequency.setValueAtTime(150, ctx.currentTime);
  g.gain.setValueAtTime(0.6, ctx.currentTime);

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime + 0.4);
}

// Load vocab
fetch('vocab.txt')
.then(r => r.text())
.then(text => {
  let temp = [];

  text.split("\n").forEach(line => {
    if (line.trim() === "===") {
      tests.push(temp);
      temp = [];
    } else {
      temp.push(line.trim());
    }
  });

  if (temp.length) tests.push(temp);

  createTestButtons();
  startTest(0);
});

function createTestButtons() {
  let c = document.getElementById("testButtons");

  tests.forEach((t,i) => {
    let b = document.createElement("button");
    b.textContent = "Test " + (i+1);

    b.onclick = () => startTest(i);

    c.appendChild(b);
  });
}

// ⭐ 修正：切換 active 狀態
function startTest(i) {
  currentTest = i;
  currentIndex = 0;

  document.getElementById("answerList").innerHTML = ""; // ⭐ 清空舊答案

  document.querySelectorAll("#testButtons button")
    .forEach((btn, index) => {
      btn.classList.toggle("active", index === i);
    });

  loadWord();
}

function loadWord() {
  attempts = 0;
  document.getElementById("result").textContent = "";

  currentWord = tests[currentTest][currentIndex];

  // ⭐ 加呢行（顯示第幾題）
  document.getElementById("questionNumber").textContent =
    (currentIndex + 1) + ".";

  createInputs();
  playSound();
}

function createInputs() {
  let c = document.getElementById("inputs");
  c.innerHTML = "";

  for (let i=0;i<currentWord.length;i++) {
    let input = document.createElement("input");
    input.maxLength = 1;
    input.className = "box";

    input.onfocus = function() {
      setTimeout(() => this.select(), 0);
    };

    input.oninput = () => {
      input.value = input.value.slice(-1);
      handleInput(i);
    };

    input.onkeydown = (e) => {
      if (e.key === "Backspace" && !input.value && i > 0) {
        c.children[i-1].focus();
      }
    };

    c.appendChild(input);
  }

  c.children[0].focus();
}

function handleInput(index) {
  let inputs = document.querySelectorAll(".box");

  if (inputs[index].value && index < inputs.length - 1) {
    inputs[index+1].focus();
  }

  let word = "";
  let full = true;

  inputs.forEach(i => {
    if (!i.value) full = false;
    word += i.value;
  });

  if (full) checkAnswer(word);
}

function checkAnswer(word) {
  let inputs = document.querySelectorAll(".box");

  inputs.forEach(i => i.disabled = true);

  if (word.toLowerCase() === currentWord.toLowerCase()) {
    inputs.forEach(i => i.classList.add("correct"));
    document.getElementById("result").textContent = "✔ Correct";
    playCorrectSound();
  } else {
    attempts++;
    inputs.forEach(i => i.classList.add("wrong"));
    playWrongSound();

    if (attempts >= 3) {
      document.getElementById("result").textContent =
        "Answer: " + currentWord;
    } else {
      setTimeout(() => {
        inputs.forEach(i => {
          i.value = "";
          i.classList.remove("wrong");
          i.disabled = false;
        });
        inputs[0].focus();
      }, 800);
    }
  }
}

function showAnswers() {
  let container = document.getElementById("answerList");
  container.innerHTML = "<h3>Answers:</h3>";

  tests[currentTest].forEach((word, index) => {
    let div = document.createElement("div");
    div.textContent = (index + 1) + ". " + word;
    container.appendChild(div);
  });
}

function nextWord() {
  if (currentIndex < tests[currentTest].length - 1) {
    currentIndex++;
    loadWord();
  } else {
    document.getElementById("result").textContent = "END";
    showAnswers(); // ⭐ 加呢行
  }
}

function prevWord() {
  if (currentIndex > 0) {
    currentIndex--;
    loadWord();
  }
}

function playSound() {
  let utter = new SpeechSynthesisUtterance(currentWord);
  let voices = speechSynthesis.getVoices();
  let v = voices.find(v => v.name.includes(selectedVoiceName));

  if (v) utter.voice = v;

  utter.lang = "en-GB";
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

document.getElementById("voiceSelect").onchange = function() {
  selectedVoiceName = this.value;
};
</script>

</body>
</html>
